name: Container

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  RPC_SERVER_VERSION: 0.0.2

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up OpenJDK 17
        uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: 17

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build using Maven
        run: mvn package

      - name: Build Docker image
        run: docker build -t rpc:${{ env.RPC_SERVER_VERSION }} .

      - name: Login to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GitHub container registry
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/rpc:${{ env.RPC_SERVER_VERSION }}

      - name: Upload the package
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ env.RPC_SERVER_VERSION }}
          path: target/server-${{ env.RPC_SERVER_VERSION }}.jar