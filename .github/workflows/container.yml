name: Container

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up OpenJDK 17
        uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: 17

      - name: Build using Maven
        run: mvn package